<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simuladores — PME Máquinas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

:root{
  --blue:#1b3c6b;
  --blue-light:#2451a0;
  --bg:#f5f7fa;
  --card:#ffffff;
  --text:#1a1a2e;
  --text-soft:#5a6377;
  --radius:14px;
  --shadow:0 2px 8px rgba(27,60,107,.10);
  --shadow-hover:0 6px 20px rgba(27,60,107,.18);
}

body{
  font-family:'Inter',Arial,sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  padding-bottom:40px;
}

/* ── HEADER ── */
header{
  background:var(--blue);
  color:#fff;
  padding:22px 20px 20px;
  text-align:center;
}
header h1{
  font-size:1.25rem;
  font-weight:700;
  letter-spacing:.3px;
}
header p{
  font-size:.8rem;
  opacity:.75;
  margin-top:4px;
}

/* ── MAIN ── */
main{
  max-width:680px;
  margin:0 auto;
  padding:28px 16px 0;
}

/* ── SECTION ── */
.section-label{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:14px;
}
.section-badge{
  background:var(--blue);
  color:#fff;
  font-size:.7rem;
  font-weight:700;
  letter-spacing:1px;
  padding:3px 9px;
  border-radius:6px;
}
.section-title{
  font-size:.95rem;
  font-weight:600;
  color:var(--text-soft);
  text-transform:uppercase;
  letter-spacing:.5px;
}

section+section{
  margin-top:32px;
}

/* ── GRID ── */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
  gap:14px;
}

/* ── CARD ── */
a.card{
  display:flex;
  flex-direction:column;
  align-items:flex-start;
  gap:10px;
  background:var(--card);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  padding:18px 16px;
  text-decoration:none;
  color:var(--text);
  transition:box-shadow .18s ease, transform .15s ease;
  -webkit-tap-highlight-color:transparent;
  cursor:pointer;
}
a.card:hover{
  box-shadow:var(--shadow-hover);
  transform:translateY(-2px);
}
a.card:active{
  transform:translateY(0);
  box-shadow:var(--shadow);
}

.card-icon{
  width:40px;
  height:40px;
  background:var(--bg);
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
}
.card-icon svg{
  width:22px;
  height:22px;
  fill:var(--blue);
}

.card strong{
  font-size:.9rem;
  font-weight:600;
  line-height:1.3;
}
.card span{
  font-size:.75rem;
  color:var(--text-soft);
  line-height:1.4;
}

/* ── EMPTY STATE ── */
.empty{
  color:var(--text-soft);
  font-size:.85rem;
  padding:18px 0 4px;
  font-style:italic;
}
</style>
</head>
<body>

<header>
  <h1>Central de Simuladores</h1>
  <p>Financiamentos e Crédito</p>
</header>

<main>

  <!-- ── CE — CONSTRUÇÃO ── -->
  <section>
    <div class="section-label">
      <span class="section-badge">CE</span>
      <span class="section-title">Construção</span>
    </div>
    <div class="grid">

      <a href="CE_maisinovacao.html" class="card">
        <div class="card-icon">
          <!-- ícone: prédio / construção -->
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M3 21V7l9-4 9 4v14H3zm2-2h4v-4H5v4zm6 0h4v-4h-4v4zm6 0h2v-4h-2v4zM5 13h4V9H5v4zm6 0h4V9h-4v4zm6 0h2V9h-2v4z"/>
          </svg>
        </div>
        <strong>Simulador<br>+Inovação</strong>
        <span>Financiamento com carência e SAC</span>
      </a>

    </div>
  </section>

  <!-- ── AG — AGRÍCOLA ── -->
  <section>
    <div class="section-label">
      <span class="section-badge">AG</span>
      <span class="section-title">Agrícola</span>
    </div>
    <div class="grid">

      <p class="empty">Simuladores em breve.</p>

    </div>
  </section>

</main>

</body>
</html>
